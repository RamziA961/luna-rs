services:
  luna-rs-dev:
    container_name: luna-rs-dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_PROFILE=debug
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    volumes:
      - ./Secrets.dev.toml:/app/Secrets.dev.toml:ro
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./Cargo.toml

  luna-rs:
    container_name: luna-rs
    image: luna-rs:latest
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - PATH=/opt/yt-dlp:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./Secrets.toml:/app/Secrets.toml:ro
      - ytdlp_data:/opt/yt-dlp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  yt-dlp-updater:
    container_name: yt-dlp-updater
    image: alpine:3.23.4
    restart: unless-stopped
    volumes:
      - ytdlp_data:/opt/yt-dlp
    command: >
      /bin/sh -c "
      apk add --no-cache curl python3 &&
      while true; do
        echo 'Checking yt-dlp status...';
        if [ ! -f /opt/yt-dlp/yt-dlp ]; then
          echo 'Downloading latest yt-dlp to shared volume...';
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /opt/yt-dlp/yt-dlp;
          chmod a+rx /opt/yt-dlp/yt-dlp;
        else
          echo 'Updating existing yt-dlp...';
          /opt/yt-dlp/yt-dlp -U;
        fi;
        echo 'Sleeping for 24 hours...';
        sleep 86400;
      done
      "
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "2"

volumes:
  ytdlp_data:
